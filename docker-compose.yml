services:
  api:
    build: backend/
    container_name: fastapi-application
    env_file:
      - ".env"
    ports:
      - '8000:8000'
    restart: "no"
    volumes:
      - ./backend:/app
      - ./prompts:/app/prompts
      - /app/.venv
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: chess-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: